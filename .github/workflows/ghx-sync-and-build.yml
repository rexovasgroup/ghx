name: "ghx: Sync upstream"

on:
  push:
    branches: [upstream]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out trunk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: trunk
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "rexovas-artifact-relay[bot]"
          git config user.email "3902638+rexovas-artifact-relay[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/cli/cli.git || true
          git fetch upstream trunk

      - name: Rebase trunk onto upstream
        id: rebase
        run: |
          if git rebase upstream/trunk; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort
            echo "status=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on conflict
        if: steps.rebase.outputs.status == 'conflict'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'rebase-conflict',
              state: 'open'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Rebase conflict: trunk needs manual resolution',
                body: `The automated rebase of \`trunk\` onto upstream failed due to conflicts.\n\nPlease resolve manually:\n\`\`\`bash\ngit fetch upstream trunk\ngit checkout trunk\ngit rebase upstream/trunk\n# resolve conflicts\ngit push --force-with-lease\n\`\`\``,
                labels: ['rebase-conflict']
              });
            }

      - name: Check for upstream changes to patched files
        if: steps.rebase.outputs.status == 'success'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { execSync } = require('child_process');
            const patchedFiles = [
              'internal/config/config.go',
              'internal/config/config_test.go'
            ];
            const upstreamChanges = execSync(
              'git diff HEAD~1 HEAD --name-only', { encoding: 'utf8' }
            ).trim().split('\n');
            const overlapping = patchedFiles.filter(f => upstreamChanges.includes(f));
            if (overlapping.length > 0) {
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'patch-overlap',
                state: 'open'
              });
              if (existing.data.length === 0) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'Upstream modified patched files — review needed',
                  body: `Upstream changed files that contain ghx patches. The rebase succeeded but the changes should be reviewed.\n\n**Overlapping files:**\n${overlapping.map(f => '- \`' + f + '\`').join('\n')}\n\nPlease verify our patches still behave correctly.`,
                  labels: ['patch-overlap']
                });
              }
            }

      - name: Run tests
        if: steps.rebase.outputs.status == 'success'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Test patched code
        if: steps.rebase.outputs.status == 'success'
        run: go test ./internal/config/...

      - name: Generate app token
        if: steps.rebase.outputs.status == 'success'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.HOOK_APP_CLIENT_ID }}
          private-key: ${{ secrets.HOOK_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          owner: rexovasgroup

      - name: Push sync branch and create PR
        if: steps.rebase.outputs.status == 'success'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force-with-lease origin HEAD:refs/heads/sync

          # Close any stale sync PRs
          gh pr list --repo "${{ github.repository }}" --label upstream-sync --state open --json number --jq '.[].number' | \
            xargs -I{} gh pr close {} --repo "${{ github.repository }}" --delete-branch 2>/dev/null || true

          # Create PR if one doesn't already exist
          EXISTING=$(gh pr list --repo "${{ github.repository }}" --head sync --base trunk --state open --json number --jq 'length')
          if [ "$EXISTING" = "0" ]; then
            gh pr create \
              --repo "${{ github.repository }}" \
              --base trunk \
              --head sync \
              --title "Upstream sync $(date +%Y-%m-%d)" \
              --body "Automated rebase of ghx patches onto latest upstream cli/cli trunk." \
              --label upstream-sync
          fi

          gh pr merge sync \
            --repo "${{ github.repository }}" \
            --squash --auto
