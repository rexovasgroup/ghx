name: "ghx: Build & release"

on:
  push:
    branches: [trunk]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out trunk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: trunk
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Fetch upstream tags
        run: |
          git remote add upstream https://github.com/cli/cli.git || true
          git fetch upstream --tags

      - name: Determine version
        id: version
        run: |
          UPSTREAM_VERSION=$(git describe --tags --abbrev=0 upstream/trunk 2>/dev/null || echo "v0.0.0")
          GHX_VERSION=$(cat GHX_VERSION 2>/dev/null || echo "1.0.0")

          echo "version=${UPSTREAM_VERSION}-ghx.${GHX_VERSION}" >> "$GITHUB_OUTPUT"
          echo "upstream=${UPSTREAM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ghx=${GHX_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cross-compile
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LDFLAGS="-s -w -X github.com/cli/cli/v2/internal/build.Version=${VERSION}"
          mkdir -p dist

          for pair in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64; do
            OS="${pair%/*}"
            ARCH="${pair#*/}"
            echo "Building ${OS}/${ARCH}..."
            GOOS="${OS}" GOARCH="${ARCH}" CGO_ENABLED=0 \
              go build -ldflags "${LDFLAGS}" -o "dist/gh_${OS}_${ARCH}" ./cmd/gh/
          done

          cd dist && sha256sum gh_* > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          UPSTREAM="${{ steps.version.outputs.upstream }}"
          REPO="${{ github.repository }}"

          # Delete existing release for this version if it exists
          gh release delete "${VERSION}" --repo "${REPO}" --yes 2>/dev/null || true
          git tag -d "${VERSION}" 2>/dev/null || true
          git push origin ":refs/tags/${VERSION}" 2>/dev/null || true

          # Generate changelog from ghx patch commits
          CHANGELOG=$(git log --pretty="- %s" upstream/trunk..HEAD -- ':!.github' ':!.githooks' ':!.gitignore' ':!GHX_VERSION' ':!Makefile' ':!install.sh' 2>/dev/null || echo "- Upstream sync")

          gh release create "${VERSION}" dist/* \
            --repo "${REPO}" \
            --target trunk \
            --title "ghx ${VERSION}" \
            --notes "$(cat <<NOTES
          Synced with upstream cli/cli ${UPSTREAM}.

          ## Install
          \`\`\`bash
          curl -sL https://get.rexov.as/ghx/install.sh | sh
          \`\`\`

          ## ghx patches
          ${CHANGELOG}
          NOTES
          )"

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.HOOK_APP_CLIENT_ID }}
          private-key: ${{ secrets.HOOK_APP_PRIVATE_KEY }}
          owner: rexovasgroup

      - name: Post-release hook
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HOOK_TARGET: ${{ secrets.HOOK_TARGET }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh api "repos/${HOOK_TARGET}/dispatches" \
            -f event_type=ghx-release \
            -f "client_payload[version]=${VERSION}" \
            -f "client_payload[tag]=${VERSION}"
